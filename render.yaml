services:
  - type: web
    name: joelbot-v20
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GOOGLE_DRIVE_TOKEN
        sync: false
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: NODE_ENV
        value: production
